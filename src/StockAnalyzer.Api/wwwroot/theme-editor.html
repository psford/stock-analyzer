<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Editor - Stock Analyzer</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: ui-sans-serif, system-ui, sans-serif;
            background: #0a0a14;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Header */
        .page-header {
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a14 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #2a2a4a;
        }
        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-title h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ff71ce, #01cdfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-title .badge {
            background: rgba(255, 113, 206, 0.2);
            color: #ff71ce;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .header-nav a {
            color: #888;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: color 0.2s;
        }
        .header-nav a:hover {
            color: #ff71ce;
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 0;
            max-width: 1600px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
        }

        /* Left Panel - Controls */
        .controls-panel {
            background: #12121a;
            border-right: 1px solid #2a2a4a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .control-section {
            background: #1a1a24;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #2a2a4a;
        }
        .control-section h3 {
            font-size: 13px;
            color: #01cdfe;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Input styles */
        .input-group {
            margin-bottom: 12px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            background: #0a0a14;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 10px 12px;
            color: #e0e0e0;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #ff71ce;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        .input-group select {
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff71ce, #b967ff);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(255, 113, 206, 0.4);
        }
        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e0;
        }
        .btn-secondary:hover:not(:disabled) {
            background: #3a3a5a;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2a2a4a;
            color: #888;
        }
        .btn-outline:hover:not(:disabled) {
            border-color: #01cdfe;
            color: #01cdfe;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: #2a2a4a;
            margin: 8px 0;
        }

        /* Status message */
        .status-message {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .status-message.success {
            display: block;
            background: rgba(5, 255, 161, 0.15);
            border: 1px solid rgba(5, 255, 161, 0.3);
            color: #05ffa1;
        }
        .status-message.info {
            display: block;
            background: rgba(1, 205, 254, 0.15);
            border: 1px solid rgba(1, 205, 254, 0.3);
            color: #01cdfe;
        }

        /* Saved themes list */
        .saved-themes-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .saved-theme-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #0a0a14;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .saved-theme-item:hover {
            background: #1a1a2e;
            border-color: #ff71ce;
        }
        .saved-theme-item .theme-info {
            flex: 1;
        }
        .saved-theme-item .theme-name {
            font-size: 13px;
            color: #e0e0e0;
        }
        .saved-theme-item .theme-date {
            font-size: 11px;
            color: #666;
        }
        .saved-theme-item .delete-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
        }
        .saved-theme-item .delete-btn:hover {
            color: #ff3366;
        }
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #555;
            font-size: 13px;
        }

        /* Right Panel - Preview */
        .preview-panel {
            background: #0a0a14;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-header h2 {
            font-size: 16px;
            color: #e0e0e0;
        }
        .preview-header .preview-actions {
            display: flex;
            gap: 8px;
        }

        #preview-container {
            flex: 1;
            min-height: 500px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        /* JSON Display */
        .json-section {
            background: #12121a;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            overflow: hidden;
        }
        .json-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #1a1a24;
            border-bottom: 1px solid #2a2a4a;
            cursor: pointer;
        }
        .json-header h4 {
            font-size: 13px;
            color: #888;
        }
        .json-header .toggle-icon {
            color: #666;
            transition: transform 0.2s;
        }
        .json-header.expanded .toggle-icon {
            transform: rotate(180deg);
        }
        .json-content {
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .json-content.visible {
            display: block;
        }
        .json-content pre {
            padding: 16px;
            margin: 0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            color: #05ffa1;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 20, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-overlay.visible {
            display: flex;
        }
        .loading-content {
            text-align: center;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #2a2a4a;
            border-top-color: #ff71ce;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #888;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            .controls-panel {
                border-right: none;
                border-bottom: 1px solid #2a2a4a;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="page-header">
        <div class="header-content">
            <div class="header-title">
                <h1>Theme Editor</h1>
                <span class="badge">AI-Powered</span>
            </div>
            <nav class="header-nav">
                <a href="/theme-preview.html">Preview Tool</a>
                <a href="/">Back to App</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-layout">
        <!-- Left Panel - Controls -->
        <aside class="controls-panel">
            <!-- Generate Section -->
            <section class="control-section">
                <h3>Generate Theme</h3>

                <div class="input-group">
                    <label for="theme-name">Theme Name</label>
                    <input type="text" id="theme-name" placeholder="My Custom Theme">
                </div>

                <div class="input-group">
                    <label for="theme-prompt">Describe Your Theme</label>
                    <textarea id="theme-prompt" placeholder="warm sunset theme with orange and coral tones, elegant and professional feel..."></textarea>
                </div>

                <div class="input-group">
                    <label for="base-theme">Base Theme</label>
                    <select id="base-theme">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>

                <button class="btn btn-primary" id="generate-btn">
                    <span>Generate Theme</span>
                </button>

                <div id="generate-status" class="status-message"></div>
            </section>

            <!-- Refine Section -->
            <section class="control-section" id="refine-section" style="display: none;">
                <h3>Refine Theme</h3>

                <div class="input-group">
                    <label for="refine-feedback">What would you like to change?</label>
                    <textarea id="refine-feedback" placeholder="make the accent color more vibrant pink, add subtle scanlines effect..."></textarea>
                </div>

                <button class="btn btn-secondary" id="refine-btn">
                    <span>Refine Theme</span>
                </button>

                <div id="refine-status" class="status-message"></div>
            </section>

            <div class="divider"></div>

            <!-- Actions Section -->
            <section class="control-section" id="actions-section" style="display: none;">
                <h3>Actions</h3>

                <div class="btn-row">
                    <button class="btn btn-outline" id="copy-json-btn" title="Copy theme JSON to clipboard">
                        Copy JSON
                    </button>
                    <button class="btn btn-outline" id="save-btn" title="Save to browser storage">
                        Save
                    </button>
                </div>

                <button class="btn btn-primary" id="apply-btn" style="margin-top: 8px;">
                    Apply to App
                </button>
            </section>

            <div class="divider"></div>

            <!-- Saved Themes -->
            <section class="control-section">
                <h3>Saved Themes</h3>
                <div id="saved-themes-list" class="saved-themes-list">
                    <div class="empty-state">No saved themes yet</div>
                </div>
            </section>
        </aside>

        <!-- Right Panel - Preview -->
        <section class="preview-panel">
            <div class="preview-header">
                <h2>Live Preview</h2>
            </div>

            <div id="preview-container"></div>

            <!-- JSON Display -->
            <div class="json-section">
                <div class="json-header" id="json-toggle">
                    <h4>Theme JSON</h4>
                    <span class="toggle-icon">&#9660;</span>
                </div>
                <div class="json-content" id="json-content">
                    <pre id="json-display">// Generate a theme to see JSON here</pre>
                </div>
            </div>
        </section>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text" id="loading-text">Generating theme...</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/themePreview.js"></script>
    <script src="/js/themeLoader.js"></script>
    <script src="/js/themeEditor.js"></script>
    <script>
        // Initialize editor
        document.addEventListener('DOMContentLoaded', () => {
            ThemeEditor.init();
        });
    </script>
</body>
</html>
